<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boussole — Marque-pages d'exception</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --cream: #f5f0e8;
    --kraft: #c8a97e;
    --dark: #1a1510;
    --terracotta: #2d6eb5;
    --sage: #7a8c72;
    --gold: #d4a843;
    --warm-white: #faf7f2;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); overflow-x: hidden; }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: var(--cream);
    border-bottom: 1px solid rgba(200,169,126,0.3);
    backdrop-filter: blur(8px);
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; color: var(--dark); letter-spacing: -0.02em; text-decoration: none; }
  .logo span { color: var(--terracotta); }
  nav { display: flex; align-items: center; }
  nav a { font-size: 0.85rem; font-weight: 500; color: var(--dark); text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase; margin-left: 2.5rem; opacity: 0.7; transition: opacity 0.2s; }
  nav a:hover { opacity: 1; }
  .cart-trigger { margin-left: 2.5rem; background: var(--dark); color: var(--cream); border: none; padding: 0.55rem 1.2rem; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: background 0.2s; }
  .cart-trigger:hover { background: var(--terracotta); }
  .cart-bubble { background: var(--gold); color: var(--dark); border-radius: 50%; width: 18px; height: 18px; font-size: 0.68rem; font-weight: 700; display: none; align-items: center; justify-content: center; }
  .cart-bubble.visible { display: flex; }

  .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 80px; }
  .hero-text { display: flex; flex-direction: column; justify-content: center; padding: 6rem 4rem; }
  .hero-eyebrow { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--terracotta); margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.8s 0.2s forwards; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 5vw, 5rem); line-height: 1.1; color: var(--dark); margin-bottom: 1.8rem; opacity: 0; animation: fadeUp 0.8s 0.35s forwards; }
  .hero-title em { font-style: italic; color: var(--terracotta); }
  .hero-sub { font-size: 1.05rem; font-weight: 300; line-height: 1.7; color: var(--dark); opacity: 0; max-width: 420px; animation: fadeUp 0.8s 0.5s forwards; margin-bottom: 2.8rem; }
  .hero-sub b { opacity: 0.5; }
  .btn-primary { display: inline-flex; align-items: center; gap: 0.6rem; background: var(--dark); color: var(--cream); padding: 1rem 2rem; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.05em; border: none; cursor: pointer; text-decoration: none; transition: background 0.25s, transform 0.2s; opacity: 0; animation: fadeUp 0.8s 0.65s forwards; }
  .btn-primary:hover { background: var(--terracotta); transform: translateY(-2px); }
  .hero-visual { background: var(--kraft); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .hero-visual::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 70%, rgba(45,110,181,0.4) 0%, transparent 60%), radial-gradient(circle at 80% 20%, rgba(212,168,67,0.3) 0%, transparent 50%); }
  .hero-bookmark-display { position: relative; z-index: 1; display: flex; gap: 1.5rem; align-items: flex-end; }
  .bm-card { width: 70px; border-radius: 4px 4px 0 0; background: var(--warm-white); box-shadow: 4px 8px 30px rgba(26,21,16,0.3); display: flex; flex-direction: column; align-items: center; padding: 1rem 0.5rem; gap: 0.5rem; animation: float 3s ease-in-out infinite; }
  .bm-card:nth-child(2) { height: 220px; animation-delay: 0.5s; background: #e8ddd0; }
  .bm-card:nth-child(1) { height: 180px; animation-delay: 1s; }
  .bm-card:nth-child(3) { height: 200px; animation-delay: 0.2s; background: #d4c4b0; }
  .bm-stripe { width: 40px; height: 4px; border-radius: 2px; background: var(--terracotta); margin-bottom: 0.3rem; }
  .bm-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--sage); opacity: 0.6; }
  .bm-line { width: 35px; height: 2px; background: var(--dark); opacity: 0.2; }

  .band { background: var(--dark); color: var(--cream); padding: 1.1rem 4rem; display: flex; gap: 3rem; overflow: hidden; white-space: nowrap; }
  .band-inner { display: flex; gap: 4rem; animation: ticker 18s linear infinite; }
  .band-item { font-size: 0.82rem; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; flex-shrink: 0; }
  .band-item::before { content: '◆ '; color: var(--gold); opacity: 1; }

  /* ─── SETUP BANNER ─── */
  .setup-banner { background: #fff8e6; border: 1px solid rgba(212,168,67,0.4); padding: 1.5rem 4rem; display: none; }
  .setup-banner.visible { display: block; }
  .setup-banner h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 0.6rem; }
  .setup-banner p { font-size: 0.85rem; opacity: 0.7; margin-bottom: 0.8rem; line-height: 1.6; }
  .setup-banner a { color: var(--terracotta); }
  .setup-sql-block { background: var(--dark); color: #c8dcf0; padding: 1rem 1.5rem; font-size: 0.75rem; line-height: 1.75; overflow-x: auto; border-radius: 4px; font-family: monospace; margin-bottom: 0.8rem; white-space: pre; }
  .btn-copy { background: var(--gold); color: var(--dark); border: none; padding: 0.55rem 1.3rem; font-size: 0.8rem; font-weight: 500; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; transition: opacity 0.2s; }
  .btn-copy:hover { opacity: 0.85; }

  .section-header { padding: 5rem 4rem 2.5rem; display: flex; align-items: flex-end; justify-content: space-between; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; line-height: 1.2; }
  .section-title em { font-style: italic; color: var(--terracotta); }
  .section-count { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.4; padding-bottom: 0.5rem; }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2px; padding: 0 4rem 6rem; }
  .product-card { background: var(--warm-white); position: relative; overflow: hidden; cursor: pointer; transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); animation: fadeUp 0.6s both; }
  .product-card:hover { transform: translateY(-6px); z-index: 2; }
  .product-card:hover .card-overlay { opacity: 1; }
  .card-img { width: 100%; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .card-bookmark-visual { width: 80px; background: white; border-radius: 6px 6px 0 0; box-shadow: 0 8px 32px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; padding: 1.2rem 0.7rem 0; gap: 0.5rem; transition: transform 0.3s; }
  .product-card:hover .card-bookmark-visual { transform: scale(1.08) rotate(-2deg); }
  .cbv-stripe { width: 50px; height: 5px; border-radius: 3px; }
  .cbv-line { width: 45px; height: 2px; border-radius: 1px; background: rgba(0,0,0,0.12); margin: 2px 0; }
  .cbv-circle { width: 28px; height: 28px; border-radius: 50%; margin-top: 0.4rem; opacity: 0.7; }
  .cbv-tail { width: 80px; height: 40px; clip-path: polygon(0 0, 100% 0, 100% 60%, 50% 100%, 0 60%); margin-top: -2px; }
  .card-overlay { position: absolute; inset: 0; background: rgba(26,21,16,0.06); opacity: 0; transition: opacity 0.3s; display: flex; align-items: center; justify-content: center; }
  .overlay-btn { background: var(--dark); color: var(--cream); padding: 0.7rem 1.5rem; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; border: none; cursor: pointer; transform: translateY(10px); transition: transform 0.3s, background 0.2s; }
  .product-card:hover .overlay-btn { transform: translateY(0); }
  .overlay-btn:hover { background: var(--terracotta); }
  .overlay-btn.added { background: var(--sage); }
  .card-info { padding: 1.2rem 1.4rem 1.4rem; border-top: 1px solid rgba(200,169,126,0.2); }
  .card-tag { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sage); font-weight: 500; margin-bottom: 0.4rem; }
  .card-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; margin-bottom: 0.3rem; color: var(--dark); }
  .card-desc { font-size: 0.82rem; opacity: 0.55; line-height: 1.5; margin-bottom: 0.9rem; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-price { font-size: 1.1rem; font-weight: 500; color: var(--terracotta); }
  .card-badge { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; background: var(--sage); color: white; padding: 0.25rem 0.6rem; border-radius: 20px; }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 5rem 2rem; opacity: 0.5; }
  .empty-state p { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-style: italic; margin-top: 1rem; }

  /* Skeleton */
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .skeleton { background: linear-gradient(90deg, rgba(200,169,126,0.1) 25%, rgba(200,169,126,0.22) 50%, rgba(200,169,126,0.1) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }

  .values { background: var(--dark); color: var(--cream); padding: 5rem 4rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3rem; }
  .value-item h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 0.8rem; color: var(--gold); }
  .value-item p { font-size: 0.9rem; line-height: 1.7; opacity: 0.6; }
  .value-num { font-size: 3rem; font-weight: 300; color: rgba(255,255,255,0.07); font-family: 'Playfair Display', serif; margin-bottom: -1rem; }

  footer { background: var(--dark); border-top: 1px solid rgba(255,255,255,0.06); padding: 2rem 4rem; display: flex; align-items: center; justify-content: space-between; color: var(--cream); }
  footer a { color: var(--gold); text-decoration: none; font-size: 0.82rem; opacity: 0.7; transition: opacity 0.2s; }
  footer a:hover { opacity: 1; }
  footer p { font-size: 0.82rem; opacity: 0.4; }

  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--dark); color: var(--cream); padding: 1rem 1.6rem; font-size: 0.88rem; box-shadow: 0 4px 24px rgba(0,0,0,0.3); transform: translateY(80px); opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 9999; max-width: 320px; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══ TIROIR PANIER ═══ */
  .cart-overlay { position: fixed; inset: 0; background: rgba(26,21,16,0.45); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.35s; }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 95vw; background: var(--warm-white); z-index: 201; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); box-shadow: -8px 0 40px rgba(26,21,16,0.15); }
  .cart-drawer.open { transform: translateX(0); }
  .drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 1.6rem 2rem; border-bottom: 1px solid rgba(200,169,126,0.25); flex-shrink: 0; }
  .drawer-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--dark); }
  .drawer-close { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--dark); opacity: 0.5; padding: 0.3rem; transition: opacity 0.2s; }
  .drawer-close:hover { opacity: 1; }
  .drawer-tabs { display: flex; border-bottom: 1px solid rgba(200,169,126,0.25); flex-shrink: 0; }
  .dtab { flex: 1; padding: 0.75rem 1rem; background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dark); opacity: 0.4; cursor: pointer; border-bottom: 2px solid transparent; transition: opacity 0.2s, border-color 0.2s; }
  .dtab.active { opacity: 1; border-bottom-color: var(--terracotta); }
  .dtab:hover { opacity: 0.8; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }
  .drawer-body::-webkit-scrollbar { width: 4px; }
  .drawer-body::-webkit-scrollbar-thumb { background: rgba(200,169,126,0.4); border-radius: 2px; }

  .cart-item { display: flex; gap: 1rem; padding: 1.1rem 0; border-bottom: 1px solid rgba(200,169,126,0.18); align-items: flex-start; }
  .cart-item-visual { width: 52px; height: 68px; border-radius: 3px 3px 0 0; flex-shrink: 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 0.5rem; overflow: hidden; }
  .cart-item-body { flex: 1; }
  .cart-item-name { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--dark); margin-bottom: 0.2rem; }
  .cart-item-cat { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sage); margin-bottom: 0.5rem; }
  .cart-item-controls { display: flex; align-items: center; gap: 0.5rem; }
  .qty-btn { width: 24px; height: 24px; background: rgba(200,169,126,0.2); border: none; cursor: pointer; font-size: 1rem; color: var(--dark); display: flex; align-items: center; justify-content: center; transition: background 0.2s; border-radius: 2px; }
  .qty-btn:hover { background: rgba(200,169,126,0.45); }
  .qty-num { font-size: 0.88rem; font-weight: 500; min-width: 20px; text-align: center; color: var(--dark); }
  .cart-item-price { font-size: 1rem; font-weight: 500; color: var(--terracotta); white-space: nowrap; padding-top: 0.15rem; }
  .remove-item { background: none; border: none; cursor: pointer; font-size: 0.75rem; color: var(--dark); opacity: 0.3; padding: 0 0.3rem; transition: opacity 0.2s; align-self: flex-start; margin-top: 0.15rem; }
  .remove-item:hover { opacity: 0.7; color: #c0392b; }
  .cart-empty-msg { text-align: center; padding: 3rem 1rem; opacity: 0.45; }
  .cart-empty-msg p { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-style: italic; margin-top: 0.8rem; }
  .cart-empty-msg span { font-size: 2.5rem; }

  .drawer-footer { padding: 1.4rem 2rem 2rem; border-top: 1px solid rgba(200,169,126,0.25); flex-shrink: 0; background: var(--warm-white); }
  .total-row { display: flex; justify-content: space-between; font-size: 0.85rem; opacity: 0.6; margin-bottom: 0.4rem; }
  .total-row.grand { font-size: 1.05rem; font-weight: 500; opacity: 1; border-top: 1px solid rgba(200,169,126,0.3); padding-top: 0.7rem; margin-top: 0.5rem; color: var(--dark); }
  .drawer-actions { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1.2rem; }
  .btn-pay-now { background: var(--dark); color: var(--cream); border: none; padding: 0.9rem 1.5rem; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; width: 100%; }
  .btn-pay-now:hover { background: var(--terracotta); }
  .btn-pay-later { background: transparent; color: var(--dark); border: 1px solid rgba(26,21,16,0.25); padding: 0.9rem 1.5rem; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: border-color 0.2s, background 0.2s; width: 100%; }
  .btn-pay-later:hover { border-color: var(--terracotta); background: rgba(45,110,181,0.05); }
  .drawer-note { font-size: 0.75rem; opacity: 0.4; text-align: center; margin-top: 0.7rem; line-height: 1.5; }

  .order-card { background: white; border: 1px solid rgba(200,169,126,0.2); border-radius: 4px; padding: 1.2rem 1.4rem; margin-bottom: 1rem; }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
  .order-id { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.4; margin-bottom: 0.2rem; }
  .order-date { font-size: 0.82rem; opacity: 0.55; }
  .status-badge { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.25rem 0.7rem; border-radius: 20px; font-weight: 500; }
  .status-pending { background: rgba(212,168,67,0.15); color: #8a6a10; }
  .status-paid { background: rgba(122,140,114,0.15); color: #3d5c36; }
  .status-cancelled { background: rgba(192,57,43,0.1); color: #8b2a1d; }
  .order-items-preview { font-size: 0.82rem; opacity: 0.6; line-height: 1.6; margin-bottom: 0.8rem; font-style: italic; }
  .order-bottom { display: flex; align-items: center; justify-content: space-between; }
  .order-total { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--terracotta); }
  .order-actions { display: flex; gap: 0.5rem; }
  .btn-order-pay { background: var(--sage); color: white; border: none; padding: 0.4rem 1rem; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: background 0.2s; }
  .btn-order-pay:hover { background: #4a7c59; }
  .btn-order-cancel { background: transparent; color: var(--dark); border: 1px solid rgba(26,21,16,0.2); padding: 0.4rem 0.8rem; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: border-color 0.2s; }
  .btn-order-cancel:hover { border-color: #c0392b; color: #c0392b; }
  .orders-empty { text-align: center; padding: 3rem 1rem; opacity: 0.4; }
  .orders-empty p { font-family: 'Playfair Display', serif; font-style: italic; margin-top: 0.8rem; font-size: 1rem; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(200,169,126,0.3); border-top-color: var(--kraft); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 0.5rem; }

  @media (max-width: 900px) {
    header { padding: 1rem 2rem; }
    .hero { grid-template-columns: 1fr; }
    .hero-visual { height: 350px; }
    .hero-text { padding: 4rem 2rem; }
    .products-grid { padding: 0 1.5rem 4rem; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    .section-header { padding: 3rem 1.5rem 2rem; }
    .setup-banner { padding: 1.5rem 2rem; }
    .values { grid-template-columns: 1fr; padding: 3rem 2rem; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
    .cart-drawer { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <a href="#" class="logo">Bous<span>sole</span></a>
  <nav>
    <a href="#produits">Collections</a>
    <a href="#valeurs">À propos</a>
    <button class="cart-trigger" onclick="openCart()">
      Panier <span class="cart-bubble" id="cart-bubble">0</span>
    </button>
  </nav>
</header>



<!-- BANDEAU SETUP -->
<div class="setup-banner" id="setup-banner">
  <h3>⚙️ Initialisation requise</h3>
  <p>Les tables n'existent pas encore dans Supabase. Copiez ce SQL dans votre <a href="https://supabase.com/dashboard/project/hcexctirpiyoiynjiydm/sql/new" target="_blank">SQL Editor</a>, exécutez-le, puis rechargez la page.</p>
  <div class="setup-sql-block" id="setup-sql-block"></div>
  <button class="btn-copy" onclick="copySql()">Copier le SQL</button>
</div>

<section id="produits">
  <div class="section-header">
    <h2 class="section-title">Notre <em>collection</em></h2>
    <span class="section-count" id="product-count">Chargement…</span>
  </div>
  <div class="products-grid" id="products-grid">
    <div style="grid-column:1/-1;padding:4rem 0;text-align:center;opacity:0.4"><div class="spinner"></div> Connexion à Supabase…</div>
  </div>
</section>

<footer>
  <a href="#" class="logo" style="color:var(--cream);font-size:1.2rem;">Bous<span style="color:var(--terracotta)">sole</span></a>
  <p>© 2025 Boussole — Marque-pages d'exception</p>
</footer>

<div class="toast" id="toast"></div>

<!-- TIROIR PANIER -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="drawer-header">
    <h2 class="drawer-title">Mon panier</h2>
    <button class="drawer-close" onclick="closeCart()">✕</button>
  </div>
  <div class="drawer-tabs">
    <button class="dtab active" id="dtab-cart" onclick="showDrawerTab('cart')">Panier</button>
    <button class="dtab" id="dtab-orders" onclick="showDrawerTab('orders')">Commandes</button>
  </div>
  <div class="drawer-body" id="drawer-cart"><div id="cart-items-list"></div></div>
  <div class="drawer-body" id="drawer-orders" style="display:none"><div id="orders-list"></div></div>
  <div class="drawer-footer" id="drawer-footer" style="display:none">
    <div id="cart-totals"></div>
    <div class="drawer-actions" id="drawer-actions"></div>
    <p class="drawer-note" id="drawer-note"></p>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://hcexctirpiyoiynjiydm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_d7b_tzO35k7JlFv745_YGQ_fJZ-RB4z';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Session anonyme par navigateur
let SID = localStorage.getItem('boussole_sid');
if (!SID) { SID = 'u' + Date.now().toString(36) + Math.random().toString(36).substr(2,6); localStorage.setItem('boussole_sid', SID); }

let PRODS = []; // cache produits

const COLORS = [
  { bg:'#dce8f5', stripe:'#2d6eb5', circle:'#7a8c72', tail:'#c8dcf0' },
  { bg:'#d4e8f0', stripe:'#1a5c9e', circle:'#d4a843', tail:'#bcd8ec' },
  { bg:'#e8f0f8', stripe:'#d4a843', circle:'#2d6eb5', tail:'#d8e8f4' },
  { bg:'#f0f4f8', stripe:'#2d6eb5', circle:'#7a8c72', tail:'#e0ecf8' },
  { bg:'#dde8f2', stripe:'#0f4a8c', circle:'#d4a843', tail:'#ccdaea' },
  { bg:'#e4edf8', stripe:'#3d7ac0', circle:'#4a7c59', tail:'#d4e4f4' },
];
const col = i => COLORS[i % COLORS.length];
const fmt = n => Number(n).toFixed(2).replace('.', ',') + '\u00a0€';
const uid = () => Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2,4).toUpperCase();

// ══════════════════════════════════════════
// SQL SETUP
// ══════════════════════════════════════════
const SETUP_SQL = `-- 1. Tables
create table if not exists products (
  id serial primary key,
  name text not null,
  category text,
  price decimal(10,2) not null,
  description text,
  badge text default ''
);

create table if not exists cart_items (
  id uuid primary key default gen_random_uuid(),
  session_id text not null,
  product_id int references products(id) on delete cascade,
  quantity int not null default 1
);

create table if not exists orders (
  id text primary key,
  session_id text not null,
  items jsonb not null,
  total decimal(10,2) not null,
  status text not null default 'pending',
  order_date text,
  order_time text,
  created_at timestamptz default now()
);

-- 2. Row Level Security
alter table products enable row level security;
alter table cart_items enable row level security;
alter table orders enable row level security;

create policy "read products" on products for select using (true);
create policy "cart all" on cart_items for all using (true) with check (true);
create policy "orders all" on orders for all using (true) with check (true);

-- 3. Produits par défaut
insert into products (name, category, price, description, badge) values
  ('L''Orée des bois','Nature',8.50,'Linogravure sur papier kraft, motifs botaniques.','Bestseller'),
  ('Azur & Tempête','Mer',9.00,'Impression risographie, tons bleu nuit et blanc.','Nouveau'),
  ('Solstice','Saisons',7.50,'Papier coton, dorure à chaud sur fond terracotta.',''),
  ('Carte Blanche','Minimaliste',6.00,'Carton blanc épais, découpe géométrique.',''),
  ('Herbier No.3','Nature',10.00,'Inclusions de vraies plantes séchées sous résine.','Édition limitée'),
  ('Le Voyageur','Voyage',8.00,'Carte du monde gravée sur bois de cerisier.','')
on conflict do nothing;`;

document.getElementById('setup-sql-block').textContent = SETUP_SQL;
function copySql() {
  navigator.clipboard.writeText(SETUP_SQL).then(() => showToast('SQL copié dans le presse-papiers !'));
}

// ══════════════════════════════════════════
// PRODUITS
// ══════════════════════════════════════════
async function loadProducts() {
  const { data, error } = await supa.from('products').select('*').order('id');
  if (error) {
    console.warn('products:', error.message);
    document.getElementById('setup-banner').classList.add('visible');
    PRODS = DEFAULT_PRODS;
    renderProducts();
    return;
  }
  if (!data.length) {
    document.getElementById('setup-banner').classList.add('visible');
    PRODS = DEFAULT_PRODS;
    renderProducts();
    return;
  }
  PRODS = data;
  renderProducts();
}

async function renderProducts() {
  const cartMap = await getCartMap();
  const grid = document.getElementById('products-grid');
  document.getElementById('product-count').textContent = `${PRODS.length} produit${PRODS.length > 1 ? 's' : ''}`;

  if (!PRODS.length) {
    grid.innerHTML = '<div class="empty-state"><p>Aucun produit pour le moment.</p></div>';
    return;
  }

  grid.innerHTML = PRODS.map((p, i) => {
    const c = col(i);
    const inCart = cartMap[p.id] > 0;
    return `
    <div class="product-card" style="animation-delay:${i*0.08}s">
      <div class="card-img" style="background:${c.bg}22">
        <div class="card-bookmark-visual" style="background:${c.bg}">
          <div class="cbv-stripe" style="background:${c.stripe}"></div>
          <div class="cbv-line"></div><div class="cbv-line"></div>
          <div class="cbv-circle" style="background:${c.circle}"></div>
          <div class="cbv-line"></div>
          <div class="cbv-tail" style="background:${c.tail}"></div>
        </div>
        <div class="card-overlay">
          <button class="overlay-btn${inCart?' added':''}" onclick="addToCart(${p.id},event)">
            ${inCart ? '✓ Dans le panier' : 'Ajouter au panier'}
          </button>
        </div>
      </div>
      <div class="card-info">
        <div class="card-tag">${p.category||'Collection'}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.description||''}</div>
        <div class="card-footer">
          <div class="card-price">${fmt(p.price)}</div>
          ${p.badge ? `<span class="card-badge">${p.badge}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
// PANIER
// ══════════════════════════════════════════
async function getCartItems() {
  const { data } = await supa.from('cart_items').select('*, products(*)').eq('session_id', SID);
  return data || [];
}

async function getCartMap() {
  const items = await getCartItems();
  const m = {};
  items.forEach(ci => m[ci.product_id] = ci.quantity);
  return m;
}

async function addToCart(pid, e) {
  if (e) e.stopPropagation();
  const { data: ex } = await supa.from('cart_items').select('id,quantity').eq('session_id', SID).eq('product_id', pid).maybeSingle();
  if (ex) {
    await supa.from('cart_items').update({ quantity: ex.quantity + 1 }).eq('id', ex.id);
  } else {
    await supa.from('cart_items').insert({ session_id: SID, product_id: pid, quantity: 1 });
  }
  await afterCartChange();
  const p = PRODS.find(x => x.id === pid);
  showToast(`✓ "${p?.name}" ajouté au panier`);
  openCart();
}

async function changeQty(pid, delta) {
  const { data: ex } = await supa.from('cart_items').select('id,quantity').eq('session_id', SID).eq('product_id', pid).maybeSingle();
  if (!ex) return;
  const next = ex.quantity + delta;
  if (next <= 0) await supa.from('cart_items').delete().eq('id', ex.id);
  else await supa.from('cart_items').update({ quantity: next }).eq('id', ex.id);
  await afterCartChange();
}

async function removeFromCart(pid) {
  await supa.from('cart_items').delete().eq('session_id', SID).eq('product_id', pid);
  await afterCartChange();
}

async function afterCartChange() {
  await renderCartDrawer();
  await updateBubble();
  renderProducts();
}

async function updateBubble() {
  const m = await getCartMap();
  const count = Object.values(m).reduce((a,b)=>a+b, 0);
  const b = document.getElementById('cart-bubble');
  b.textContent = count;
  b.classList.toggle('visible', count > 0);
}

// ══════════════════════════════════════════
// RENDU TIROIR PANIER
// ══════════════════════════════════════════
async function renderCartDrawer() {
  const items = await getCartItems();
  const listEl = document.getElementById('cart-items-list');
  const footerEl = document.getElementById('drawer-footer');

  if (!items.length) {
    listEl.innerHTML = '<div class="cart-empty-msg"><span>📖</span><p>Votre panier est vide.<br>Ajoutez un marque-page pour commencer.</p></div>';
    footerEl.style.display = 'none';
    return;
  }

  footerEl.style.display = 'block';
  let total = 0;

  listEl.innerHTML = items.map(ci => {
    const p = ci.products || {};
    const idx = PRODS.findIndex(x => x.id === ci.product_id);
    const c = col(idx >= 0 ? idx : 0);
    const line = (p.price || 0) * ci.quantity;
    total += line;
    return `
    <div class="cart-item">
      <div class="cart-item-visual" style="background:${c.bg}">
        <div style="width:30px;background:white;border-radius:3px 3px 0 0;display:flex;flex-direction:column;align-items:center;padding:4px 3px 0;gap:3px">
          <div style="width:20px;height:3px;border-radius:2px;background:${c.stripe}"></div>
          <div style="width:18px;height:1px;background:rgba(0,0,0,0.12)"></div>
          <div style="width:18px;height:1px;background:rgba(0,0,0,0.12)"></div>
          <div style="width:10px;height:10px;border-radius:50%;background:${c.circle};opacity:0.7;margin-top:2px"></div>
          <div style="width:30px;height:14px;clip-path:polygon(0 0,100% 0,100% 55%,50% 100%,0 55%);background:${c.tail};margin-top:-1px"></div>
        </div>
      </div>
      <div class="cart-item-body">
        <div class="cart-item-name">${p.name||'—'}</div>
        <div class="cart-item-cat">${p.category||''}</div>
        <div class="cart-item-controls">
          <button class="qty-btn" onclick="changeQty(${ci.product_id},-1)">−</button>
          <span class="qty-num">${ci.quantity}</span>
          <button class="qty-btn" onclick="changeQty(${ci.product_id},1)">+</button>
          <span style="font-size:0.78rem;opacity:0.45;margin-left:4px">${fmt(p.price||0)} / u.</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="cart-item-price">${fmt(line)}</span>
        <button class="remove-item" onclick="removeFromCart(${ci.product_id})">✕</button>
      </div>
    </div>`;
  }).join('');

  const livFree = total >= 15;
  document.getElementById('cart-totals').innerHTML = `
    <div class="total-row"><span>Sous-total</span><span>${fmt(total)}</span></div>
    <div class="total-row"><span>Livraison</span><span>${livFree ? 'Offerte' : fmt(3.90)}</span></div>
    <div class="total-row grand"><span>Total</span><span>${fmt(total + (livFree ? 0 : 3.90))}</span></div>`;

  document.getElementById('drawer-actions').innerHTML = `
    <button class="btn-pay-now" onclick="payNow()">Payer maintenant →</button>
    <button class="btn-pay-later" onclick="payLater()">Payer plus tard</button>`;

  document.getElementById('drawer-note').textContent = livFree
    ? '✓ Livraison offerte appliquée'
    : `Plus que ${fmt(15 - total)} pour la livraison offerte`;
}

// ══════════════════════════════════════════
// COMMANDES
// ══════════════════════════════════════════
async function createOrder(status) {
  const items = await getCartItems();
  if (!items.length) return null;
  const orderItems = items.map(ci => ({ id: ci.product_id, name: ci.products?.name, category: ci.products?.category, price: ci.products?.price, qty: ci.quantity }));
  const total = orderItems.reduce((s, i) => s + i.price * i.qty, 0);
  const now = new Date();
  return {
    id: uid(),
    session_id: SID,
    items: orderItems,
    total,
    status,
    order_date: now.toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' }),
    order_time: now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })
  };
}

async function payNow() {
  const order = await createOrder('paid');
  if (!order) return;
  const { error } = await supa.from('orders').insert(order);
  if (error) { showToast('Erreur : ' + error.message); return; }
  await supa.from('cart_items').delete().eq('session_id', SID);
  await afterCartChange();
  showDrawerTab('orders');
  showToast(`✓ Commande #${order.id} confirmée !`);
}

async function payLater() {
  const order = await createOrder('pending');
  if (!order) return;
  const { error } = await supa.from('orders').insert(order);
  if (error) { showToast('Erreur : ' + error.message); return; }
  await supa.from('cart_items').delete().eq('session_id', SID);
  await afterCartChange();
  showDrawerTab('orders');
  showToast(`Commande #${order.id} enregistrée — à régler quand vous voulez`);
}

async function payOrder(id) {
  await supa.from('orders').update({ status:'paid' }).eq('id', id);
  renderOrdersDrawer();
  showToast('✓ Paiement enregistré !');
}

async function cancelOrder(id) {
  await supa.from('orders').update({ status:'cancelled' }).eq('id', id);
  renderOrdersDrawer();
  showToast('Commande annulée');
}

async function renderOrdersDrawer() {
  const el = document.getElementById('orders-list');
  el.innerHTML = '<div style="padding:1.5rem 0;opacity:0.4;font-size:0.85rem"><div class="spinner"></div> Chargement…</div>';
  const { data, error } = await supa.from('orders').select('*').eq('session_id', SID).order('created_at', { ascending: false });
  if (error || !data?.length) {
    el.innerHTML = '<div class="orders-empty"><span style="font-size:2rem">📦</span><p>Aucune commande pour le moment.</p></div>';
    return;
  }
  const labels = { pending:'En attente', paid:'Payée', cancelled:'Annulée' };
  el.innerHTML = data.map(o => {
    const preview = (o.items||[]).map(i => `${i.name} ×${i.qty}`).join(', ');
    const actions = o.status === 'pending'
      ? `<div class="order-actions"><button class="btn-order-pay" onclick="payOrder('${o.id}')">Payer</button><button class="btn-order-cancel" onclick="cancelOrder('${o.id}')">Annuler</button></div>`
      : '';
    return `<div class="order-card">
      <div class="order-top">
        <div><div class="order-id">#${o.id}</div><div class="order-date">${o.order_date} à ${o.order_time}</div></div>
        <span class="status-badge status-${o.status}">${labels[o.status]||o.status}</span>
      </div>
      <div class="order-items-preview">${preview}</div>
      <div class="order-bottom"><span class="order-total">${fmt(o.total)}</span>${actions}</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════
async function openCart() {
  await renderCartDrawer();
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
  document.body.style.overflow = '';
}
function showDrawerTab(tab) {
  const isCart = tab === 'cart';
  document.getElementById('drawer-cart').style.display = isCart ? 'block' : 'none';
  document.getElementById('drawer-orders').style.display = isCart ? 'none' : 'block';
  document.getElementById('drawer-footer').style.display = isCart ? '' : 'none';
  document.getElementById('dtab-cart').classList.toggle('active', isCart);
  document.getElementById('dtab-orders').classList.toggle('active', !isCart);
  if (!isCart) renderOrdersDrawer();
}

let _toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => t.classList.remove('show'), 3500);
}

const DEFAULT_PRODS = [
];

// ─── INIT ───
(async () => {
  await loadProducts();
  await updateBubble();
})();

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCart(); });
</script>
</body>
</html>
